<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e14;
            color: #00ffff;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1rem;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 255, 0.1);
            border-top: 3px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: rgba(0, 255, 255, 0.6);
            font-size: 0.9rem;
        }
        .error {
            color: #ff4466;
        }
        a {
            color: #00ffff;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="status">Connecting to AI server...</div>

    <script>
        fetch('config.json')
            .then(res => {
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            })
            .then(config => {
                if (!config.apiUrl) throw new Error('Missing apiUrl');
                // Redirect to the tunnel URL (Ollama web UI)
                window.location.href = config.apiUrl;
            })
            .catch(err => {
                console.error('Config error:', err);
                document.getElementById('status').innerHTML =
                    '❌ Could not load config.json. Please check the file exists.';
                document.getElementById('status').className = 'status error';
            });
    </script>
</body>
</html>
