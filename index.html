<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rust RAG Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f7f7f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .chat-container {
            max-width: 780px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 750px;
            overflow: hidden;
        }
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid #eaeaec;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fafafa;
        }
        .chat-header h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
        .chat-header .status {
            font-size: 13px; color: #6b6b6b; margin-left: auto;
            background: #eaeaea; padding: 4px 12px; border-radius: 30px;
        }
        .messages {
            flex: 1; overflow-y: auto; padding: 20px 24px 8px 24px;
            display: flex; flex-direction: column; gap: 16px; background: #ffffff;
        }
        .message { display: flex; gap: 12px; align-items: flex-start; animation: fadeIn 0.2s ease; }
        .message.user { flex-direction: row-reverse; }
        .message .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: #e1e1e1; display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0; user-select: none;
        }
        .message.user .avatar { background: #10a37f; color: white; }
        .message .bubble {
            background: #f1f1f4; padding: 12px 16px; border-radius: 20px;
            max-width: 80%; word-break: break-word; line-height: 1.5;
            color: #1a1a1a; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .message.user .bubble { background: #10a37f; color: white; }
        .message .bubble .cursor {
            display: inline-block; width: 2px; height: 1.1em;
            background: currentColor; animation: blink 1s step-end infinite; margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .input-area {
            padding: 16px 24px 24px 24px;
            border-top: 1px solid #eaeaec;
            background: #fafafa;
        }
        .input-row { display: flex; gap: 12px; align-items: flex-end; }
        .input-row textarea {
            flex: 1; border: 1px solid #d9d9e3; border-radius: 30px;
            padding: 12px 18px; font-size: 15px; font-family: inherit;
            resize: none; outline: none; background: white;
            transition: border-color 0.2s; min-height: 52px; max-height: 140px; line-height: 1.4;
        }
        .input-row textarea:focus { border-color: #10a37f; }
        .input-row button {
            background: #10a37f; border: none; color: white;
            width: 52px; height: 52px; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s; flex-shrink: 0;
        }
        .input-row button:hover { background: #0d8b6b; }
        .input-row button:disabled { background: #b0b0b0; cursor: not-allowed; }
        .input-row button svg { width: 24px; height: 24px; fill: currentColor; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 10px; }
        .messages::-webkit-scrollbar-thumb:hover { background: #b0b0b0; }
        @media (max-width: 600px) {
            body { padding: 8px; }
            .chat-container { height: 95vh; max-height: none; border-radius: 16px; }
            .messages { padding: 16px 16px 4px 16px; }
            .input-area { padding: 12px 16px 16px 16px; }
        }
        .source-tag {
            font-size: 12px;
            font-weight: 600;
            color: #0d8b6b;
            background: #e6f7f0;
            padding: 2px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 6px;
            border: 1px solid #0d8b6b;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Rust RAG Bot</h1>
            <span class="status" id="status">● Ready</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <div class="input-row">
                <textarea id="input" rows="1" placeholder="Ask anything..." disabled></textarea>
                <button id="send" disabled>
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const statusEl = document.getElementById('status');

        let isProcessing = false;
        let API_BASE = '';
        let rafId = null;
        let pendingContent = '';

        async function loadConfig() {
            try {
                const resp = await fetch('config.js');
                if (resp.ok) {
                    const text = await resp.text();
                    const match = text.match(/const\s+API_URL\s*=\s*["']([^"']+)["']/);
                    if (match) {
                        API_BASE = match[1];
                        console.log('✅ API URL loaded:', API_BASE);
                        const link = document.createElement('link');
                        link.rel = 'preconnect';
                        link.href = new URL(API_BASE).origin;
                        document.head.appendChild(link);
                        return;
                    }
                }
            } catch (e) {}
            API_BASE = '';
        }

        function appendMessage(role, content, source = null) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            if (source && role === 'assistant') {
                const tag = document.createElement('span');
                tag.className = 'source-tag';
                tag.textContent = `⚡ ${source}`;
                bubble.appendChild(tag);
                console.log(`✅ Source: ${source}`);
            }
            div.appendChild(avatar);
            div.appendChild(bubble);
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return { div, bubble };
        }

        function setBubbleContent(bubble, content, withCursor = false) {
            pendingContent = content;
            if (rafId) return;
            rafId = requestAnimationFrame(() => {
                rafId = null;
                const safe = pendingContent.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                if (withCursor) {
                    bubble.innerHTML = safe + '<span class="cursor"></span>';
                } else {
                    bubble.textContent = safe;
                }
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }

        function flushBubbleContent(bubble, content) {
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
            const safe = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            bubble.textContent = safe;
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.color = isError ? '#d32f2f' : '#6b6b6b';
        }

        function enableUI(enabled) {
            inputEl.disabled = !enabled;
            sendBtn.disabled = !enabled;
            if (enabled) inputEl.focus();
        }

        // ---- sendBeacon prefetch ----
        let preFetchTimeout = null;
        inputEl.addEventListener('input', () => {
            clearTimeout(preFetchTimeout);
            preFetchTimeout = setTimeout(() => {
                const partial = inputEl.value.trim();
                if (partial.length > 3 && !isProcessing) {
                    const url = API_BASE ? `${API_BASE}/prefetch` : '/prefetch';
                    navigator.sendBeacon(url, JSON.stringify({ partial }));
                }
            }, 500);
        });

        // ---- Send message ----
        async function sendMessage() {
            if (isProcessing) return;
            const question = inputEl.value.trim();
            if (!question) return;

            inputEl.value = '';
            isProcessing = true;
            enableUI(false);
            setStatus('● Thinking...');

            appendMessage('user', question);
            const { bubble } = appendMessage('assistant', '');
            setBubbleContent(bubble, '', true);
            let fullAnswer = '';

            try {
                const url = API_BASE ? `${API_BASE}/ask` : '/ask';
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, stream: true })
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    throw new Error(`Server error (${resp.status}): ${errText}`);
                }

                const contentType = resp.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    const data = await resp.json();
                    fullAnswer = data.answer;
                    flushBubbleContent(bubble, fullAnswer);
                    if (data.source) {
                        const tag = document.createElement('span');
                        tag.className = 'source-tag';
                        tag.textContent = `⚡ ${data.source}`;
                        bubble.appendChild(tag);
                    }
                    setStatus('● Ready');
                    isProcessing = false;
                    enableUI(true);
                    inputEl.focus();
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(l => l.trim());
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.token !== undefined) {
                                    fullAnswer += data.token;
                                    setBubbleContent(bubble, fullAnswer, true);
                                }
                                if (data.done) {
                                    if (data.source) {
                                        const tag = document.createElement('span');
                                        tag.className = 'source-tag';
                                        tag.textContent = `⚡ ${data.source}`;
                                        bubble.appendChild(tag);
                                    }
                                    break;
                                }
                            } catch (e) { console.warn('Parse error:', e, line); }
                        }
                    }
                }

                flushBubbleContent(bubble, fullAnswer);
                setStatus('● Ready');
            } catch (err) {
                console.error(err);
                flushBubbleContent(bubble, `⚠️ Error: ${err.message}`);
                setStatus('⚠️ Error', true);
            } finally {
                isProcessing = false;
                enableUI(true);
                inputEl.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
        });

        async function init() {
            await loadConfig();
            enableUI(true);
            inputEl.focus();
            setStatus('● Ready');
            appendMessage('assistant', '👋 Ask me anything!');
        }
        init();
    </script>
</body>
</html>
